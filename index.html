<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VantaWeather</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta/dist/vanta.clouds.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  </head>
  <body>
    <div id="bg"></div>
    <div id="vanta-bg"></div>
    <div id="rain-container"></div>

    <div class="app">
      <div class="sidebar">
        <a href="index.html">🏠</a>
        <a href="about.html">ℹ️</a>
        <a href="privacy.html">🔒</a>
        <a href="terms.html">📜</a>
      </div>

      <div class="main">
        <h1>🌤️ VantaWeather</h1>
        <p>Futuristic weather platform</p>

        <div class="search">
          <input id="cityInput" placeholder="Enter city..." />
          <button onclick="getWeather()">Search</button>
          <button onclick="useMyLocation()">📍</button>
        </div>

        <div class="card main" id="weather">
          <h2 id="cityName">Your City</h2>
          <h1 id="temp">--°C</h1>
          <canvas id="weather-icon" width="100" height="100"></canvas>
          <p id="condition">--</p>
        </div>

        <div class="grid">
          <div class="card">Wind: <span id="wind"></span></div>
          <div class="card">Humidity: <span id="humidity"></span></div>
          <div class="card">UV: <span id="uv"></span></div>
          <div class="card">Visibility: <span id="visibility"></span></div>
        </div>

        <canvas id="weatherGraph" height="150"></canvas>
        <div class="card" id="fun"></div>
        <div id="map"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
